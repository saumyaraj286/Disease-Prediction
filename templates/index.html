<!DOCTYPE html>
<html>
<head>
    <title>Disease Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            background-color: #f0f4f8;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: #2d3748; text-align: center; }
        .symptom {
            display: flex;
            align-items: center;
            padding: 10px;
            margin: 8px 0;
            background: #f7fafc;
            border-radius: 8px;
        }
        .symptom input { width: 20px; height: 20px; margin-right: 15px; }
        .symptom label { font-size: 16px; color: #4a5568; }
        button {
            width: 100%;
            padding: 15px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #3182ce; }
        .result {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #c6f6d5;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            color: #276749;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏥 Disease Prediction</h1>
        <p style="text-align:center; color:#718096;">Select your symptoms below</p>
        <form method="POST">
            <div class="symptom">
                <input type="checkbox" name="fever" value="1">
                <label>🌡️ Fever</label>
            </div>
            <div class="symptom">
                <input type="checkbox" name="cough" value="1">
                <label>😷 Cough</label>
            </div>
            <div class="symptom">
                <input type="checkbox" name="fatigue" value="1">
                <label>😴 Fatigue</label>
            </div>
            <div class="symptom">
                <input type="checkbox" name="headache" value="1">
                <label>🤕 Headache</label>
            </div>
            <div class="symptom">
                <input type="checkbox" name="nausea" value="1">
                <label>🤢 Nausea</label>
            </div>
            <button type="submit">🔍 Predict Disease</button>
        </form>
        {% if prediction %}
        <div class="result">
            Predicted Disease: {{ prediction }}
        </div>
        {% endif %}
    </div>
</body>
</html>
